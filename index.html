<link rel="manifest" href="manifest.json">

<style>
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%;background:#E7E8E2;overflow:hidden;overscroll-behavior:none;
    font-family:'Hanken Grotesk',-apple-system,system-ui,sans-serif;color:#2C3A34;
    -webkit-font-smoothing:antialiased}
  ::-webkit-scrollbar{display:none}
  input,textarea,button{font-family:inherit}
  input[type=range]{accent-color:#7E9C82;height:26px}
  .serif{font-family:'Newsreader',Georgia,serif}
  #app{position:fixed;inset:0;display:flex;justify-content:center;background:#E7E8E2;overflow:hidden}
  .col{position:relative;width:100%;max-width:520px;height:100%;display:flex;flex-direction:column;overflow:hidden;background:#E7E8E2}
  .scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;
    padding:max(56px,calc(env(safe-area-inset-top) + 12px)) 0 calc(104px + env(safe-area-inset-bottom))}
  .pad{padding:0 22px}
  .tap{cursor:pointer}
  @keyframes up{from{transform:translateY(110%)}to{transform:translateY(0)}}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  @keyframes drop{from{transform:translateY(-130%);opacity:0}to{transform:translateY(0);opacity:1}}
  @keyframes rise{from{transform:translateY(140%);opacity:0}to{transform:translateY(0);opacity:1}}

</head>
<body>
<div id="app"></div>
<script>
(function(){
  "use strict";
  var SAGE='#7E9C82',CLAY='#B5896E',BLUE='#8193AE',PLUM='#948AA0',INK='#2C3A34',INK2='#727B74';
  var STORE='esete-v4';
  var DIMCOLORS=['#7E9C82','#B5896E','#8193AE','#948AA0','#6F9C94'];
  var DAYWORDS=['Grateful','Joyful','Calm','Productive','Hopeful','Tired','Stressed','Content'];
  var CUR={CLP:{s:'$',d:0,l:'es-CL'},USD:{s:'$',d:2,l:'en-US'},EUR:{s:'€',d:2,l:'es-ES'}};

  var QUOTES=[
    {t:'You do not rise to the level of your goals. You fall to the level of your systems.',a:'James Clear',b:'Atomic Habits'},
    {t:'You are one decision away from a completely different life.',a:'Mel Robbins',b:'The High 5 Habit'},
    {t:'You can be a masterpiece and a work in progress at the same time.',a:'Brianna Wiest',b:'The Mountain Is You'},
    {t:'Working hard for something we love is called passion.',a:'Simon Sinek',b:'Start With Why'},
    {t:'Almost any habit can be reshaped with time and effort.',a:'Charles Duhigg',b:'The Power of Habit'},
    {t:'The greatest step toward a life of simplicity is to learn to let go.',a:'Brianna Wiest',b:'101 Essays'},
    {t:'Every action you take is a vote for the type of person you wish to become.',a:'James Clear',b:'Atomic Habits'}
  ];

  // ---- settings (editable here, persisted) ----
  var settings={currency:'CLP',featuredQuote:'Auto (daily)',reminderTime:'9:00'};

  var state={
    tab:'today',summaryPeriod:'weekly',notif:false,showInstall:false,
    medSelDay:'',medWeekStart:'',medMonthView:false,medMonthAnchor:'',
    sheet:null,editId:null,day:'',history:{},
    meds:[
      {id:'m1',name:'Vitamin D',dose:'1000 IU',times:['8:00'],done:[false],weekdays:[1,1,1,1,1,1,1]},
      {id:'m2',name:'Omega-3',dose:'1 capsule',times:['8:00'],done:[false],weekdays:[1,1,1,1,1,1,1]},
      {id:'m3',name:'Magnesium',dose:'200 mg',times:['21:00'],done:[false],weekdays:[1,1,1,1,1,0,0]},
      {id:'m4',name:'Probiotic',dose:'1 capsule',times:['8:00','21:00'],done:[false,false],weekdays:[1,1,1,1,1,1,1]}
    ],
    expenses:[],
    habits:[
      {id:'h1',name:'Morning walk',streak:0,done:false,days:[0,0,0,0,0,0,0]},
      {id:'h2',name:'Read 20 minutes',streak:0,done:false,days:[0,0,0,0,0,0,0]},
      {id:'h3',name:'Drink water',streak:0,done:false,days:[0,0,0,0,0,0,0]},
      {id:'h4',name:'Meditate',streak:0,done:false,days:[0,0,0,0,0,0,0]},
      {id:'h5',name:'No phone after 10pm',streak:0,done:false,days:[0,0,0,0,0,0,0]}
    ],
    reflectDims:[
      {id:'d1',label:'Mood',color:'#7E9C82',value:50},
      {id:'d2',label:'Energy',color:'#B5896E',value:50},
      {id:'d3',label:'Calm',color:'#8193AE',value:50},
      {id:'d4',label:'Focus',color:'#948AA0',value:50}
    ],
    reflectNote:'',reflectSaved:false,reflectWord:'',reflectWordOther:'',
    draftE:{amount:'',cat:'Food',label:''},
    draftM:{name:'',dose:'',times:[],weekdays:[1,1,1,1,1,1,1],timeInput:''},
    draftH:{name:''},
    draftD:{label:'',color:'#7E9C82'}
  };

  // ---------- helpers ----------
  function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}
  function uid(){return Math.random().toString(36).slice(2,9);}
  function fmtKey(d){return d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate();}
  function todayKey(){return fmtKey(new Date());}
  function monIndexToday(){return (new Date().getDay()+6)%7;}
  function curMeta(){return CUR[settings.currency]||CUR.CLP;}
  function money(n){var m=curMeta();var num=Number(n);return m.s+(m.d?num.toLocaleString(m.l,{minimumFractionDigits:2,maximumFractionDigits:2}):Math.round(num).toLocaleString(m.l));}
  function catColor(c){return({Food:CLAY,Transport:BLUE,Personal:PLUM,Home:SAGE,Health:SAGE,Other:INK2})[c]||INK2;}
  function word(v){return v>=78?'Great':v>=55?'Good':v>=35?'Okay':v>=18?'Low':'Hard';}
  function effWord(){return state.reflectWord==='__other__'?(state.reflectWordOther||'').trim():state.reflectWord;}
  function medOn(m,mi){var wd=(m.weekdays&&m.weekdays.length===7)?m.weekdays:[1,1,1,1,1,1,1];return !!wd[mi];}
  function pad2(n){return (n<10?'0':'')+n;}
  function keyToISO(k){var p=String(k).split('-');return p[0]+'-'+pad2(+p[1])+'-'+pad2(+p[2]);}
  function isoToKey(s){var p=String(s).split('-');return (+p[0])+'-'+(+p[1])+'-'+(+p[2]);}
  function keyToDate(k){var p=String(k).split('-');return new Date(+p[0],(+p[1])-1,+p[2]);}
  function keyNum(k){var p=String(k).split('-');return (+p[0])*10000+(+p[1])*100+(+p[2]);}
  function mondayOf(d){var x=new Date(d);x.setHours(0,0,0,0);var wi=(x.getDay()+6)%7;x.setDate(x.getDate()-wi);return x;}
  function prettyShort(k){return keyToDate(k).toLocaleDateString('en-US',{month:'short',day:'numeric'});}
  function medActiveOn(m,dateObj){var k=fmtKey(dateObj);if(m.start&&keyNum(k)<keyNum(m.start))return false;if(m.end&&keyNum(k)>keyNum(m.end))return false;var wi=(dateObj.getDay()+6)%7;return medOn(m,wi);}
  function dayMeta(dd){var act=state.meds.filter(function(m){return medActiveOn(m,dd);});var doses=0;act.forEach(function(m){doses+=(m.times||[]).length;});return{doses:doses,ongoing:act.some(function(m){return !m.end;}),course:act.some(function(m){return !!m.end;})};}
  function calDot(meta){return '<div style="display:flex;gap:3px;justify-content:center;height:6px;margin-top:1px">'+(meta.ongoing?'<span style="width:5px;height:5px;border-radius:50%;background:#C7C9C0"></span>':'')+(meta.course?'<span style="width:5px;height:5px;border-radius:50%;background:#E0913F"></span>':'')+'</div>';}

  function dayQuote(){
    var pick=settings.featuredQuote||'Auto (daily)';
    if(pick&&pick!=='Auto (daily)'){for(var i=0;i<QUOTES.length;i++)if(QUOTES[i].a===pick)return QUOTES[i];}
    return QUOTES[Math.floor(Date.now()/86400000)%QUOTES.length];
  }

  // ---------- persistence ----------
  function persistable(){return{day:state.day,history:state.history,meds:state.meds,expenses:state.expenses,habits:state.habits,reflectDims:state.reflectDims,reflectNote:state.reflectNote,reflectSaved:state.reflectSaved,reflectWord:state.reflectWord,reflectWordOther:state.reflectWordOther,summaryPeriod:state.summaryPeriod,settings:settings};}
  function save(){try{localStorage.setItem(STORE,JSON.stringify(persistable()));}catch(e){}}

  function rng(seed){var s=(seed*9301+49297)%233280;return function(){s=(s*9301+49297)%233280;return s/233280;};}
  function buildSeed(){
    var history={},expenses=[];
    var cats=['Food','Transport','Personal','Home','Health','Other'];
    var today=new Date();today.setHours(0,0,0,0);
    var tkey=fmtKey(today);
    expenses.push({id:uid(),label:'Morning coffee',amount:2500,cat:'Food',time:'8:15',date:tkey,ts:today.getTime()+8*3.6e6});
    expenses.push({id:uid(),label:'Bus fare',amount:800,cat:'Transport',time:'9:05',date:tkey,ts:today.getTime()+9*3.6e6});
    for(var i=1;i<=60;i++){
      var d=new Date(today);d.setDate(today.getDate()-i);
      var key=fmtKey(d);var r=rng(i*7+3);
      history[key]={medSch:4,medTk:Math.max(0,Math.min(4,Math.round(2+r()*2.4))),
        habSch:5,habDone:Math.max(0,Math.min(5,Math.round(2+r()*3.2))),
        dims:{Mood:50+Math.round(r()*40),Energy:42+Math.round(r()*40),Calm:48+Math.round(r()*38),Focus:40+Math.round(r()*42)},
        reflected:r()>0.28};
      var n=1+Math.floor(r()*3);
      for(var j=0;j<n;j++){var cat=cats[Math.floor(r()*cats.length)];var amount=Math.round((600+r()*9000)/100)*100;
        expenses.push({id:uid(),label:cat,amount:amount,cat:cat,time:'',date:key,ts:d.getTime()+Math.floor(r()*8e7)});}
    }
    return{history:history,expenses:expenses};
  }
  function liveSnapshot(){
    var _today=new Date();var medSch=0,medTk=0;
    state.meds.forEach(function(m){if(medActiveOn(m,_today)){medSch+=(m.times||[]).length;medTk+=(m.done||[]).filter(Boolean).length;}});
    var habSch=state.habits.length;var habDone=state.habits.filter(function(h){return h.done;}).length;
    var dims={};state.reflectDims.forEach(function(d){dims[d.label]=d.value;});
    return{medSch:medSch,medTk:medTk,habSch:habSch,habDone:habDone,dims:dims,reflected:state.reflectSaved,word:effWord()};
  }
  function rollover(){
    var today=todayKey();
    if(state.day&&state.day!==today){
      var snap=liveSnapshot();
      state.history[state.day]=snap;
      state.day=today;
      state.meds=state.meds.map(function(m){return Object.assign({},m,{done:(m.times||[]).map(function(){return false;})});});
      state.habits=state.habits.map(function(h){return Object.assign({},h,{done:false});});
      state.reflectNote='';state.reflectSaved=false;state.reflectWord='';state.reflectWordOther='';
    }else if(!state.day){state.day=today;}
  }
  function load(){
    try{
      var raw=localStorage.getItem(STORE);
      if(raw){
        var data=JSON.parse(raw);
        if(data.settings)settings=Object.assign(settings,data.settings);
        if(Array.isArray(data.meds))data.meds=data.meds.map(function(m){
          var times=Array.isArray(m.times)&&m.times.length?m.times:(m.time?[m.time]:['Anytime']);
          var weekdays=(Array.isArray(m.weekdays)&&m.weekdays.length===7)?m.weekdays:[1,1,1,1,1,1,1];
          var done=Array.isArray(m.done)&&m.done.length===times.length?m.done:times.map(function(){return false;});
          return{id:m.id,name:m.name,dose:m.dose,times:times,weekdays:weekdays,done:done,start:m.start||null,end:m.end||null};
        });
        ['summaryPeriod','day','history','meds','expenses','habits','reflectDims','reflectNote','reflectSaved','reflectWord','reflectWordOther'].forEach(function(k){if(data[k]!==undefined)state[k]=data[k];});
        rollover();return;
      }
    }catch(e){}
    state.history={};state.expenses=[];state.day=todayKey();
  }

  function computeSummary(period){
    var days=daysInPeriod(period);var tkey=todayKey();var live=liveSnapshot();
    var medSch=0,medTk=0,habSch=0,habDone=0,reflectedCount=0;
    var dimSum={},dimCnt={},dayset={};
    days.forEach(function(k){dayset[k]=1;});
    days.forEach(function(k){
      var snap=k===tkey?live:state.history[k];if(!snap)return;
      medSch+=snap.medSch||0;medTk+=snap.medTk||0;habSch+=snap.habSch||0;habDone+=snap.habDone||0;
      if(snap.reflected)reflectedCount++;
      if(snap.dims)Object.keys(snap.dims).forEach(function(l){dimSum[l]=(dimSum[l]||0)+snap.dims[l];dimCnt[l]=(dimCnt[l]||0)+1;});
    });
    var exps=state.expenses.filter(function(e){return dayset[e.date];});
    var spent=exps.reduce(function(a,e){return a+e.amount;},0);
    var catMap={};exps.forEach(function(e){catMap[e.cat]=(catMap[e.cat]||0)+e.amount;});
    var cats=Object.keys(catMap).map(function(c){return{cat:c,amount:catMap[c]};}).sort(function(a,b){return b.amount-a.amount;});
    var dims=state.reflectDims.map(function(d){return{label:d.label,avg:dimCnt[d.label]?Math.round(dimSum[d.label]/dimCnt[d.label]):d.value};});
    var habitRate=habSch?Math.round(habDone/habSch*100):0;
    var medRate=medSch?Math.round(medTk/medSch*100):0;
    var best=null;dims.forEach(function(d){if(!best||d.avg>best.avg)best=d;});
    var today=new Date();
    var sub=period==='weekly'?'Last 7 days':period==='monthly'?today.toLocaleDateString('en-US',{month:'long',year:'numeric'}):today.getFullYear()+' so far';
    var highlight=best?best.label+' was your strongest, averaging '+word(best.avg).toLowerCase()+'.':reflectedCount+' reflections logged.';
    return{sub:sub,spent:spent,cats:cats,dims:dims,habitRate:habitRate,medRate:medRate,highlight:highlight};
  }
  function daysInPeriod(period){
    var out=[];var today=new Date();today.setHours(0,0,0,0);
    if(period==='weekly'){for(var i=6;i>=0;i--){var d=new Date(today);d.setDate(today.getDate()-i);out.push(d);}}
    else if(period==='monthly'){for(var day=1;day<=today.getDate();day++)out.push(new Date(today.getFullYear(),today.getMonth(),day));}
    else{var dd=new Date(today.getFullYear(),0,1);while(dd<=today){out.push(new Date(dd));dd.setDate(dd.getDate()+1);}}
    return out.map(function(d){return fmtKey(d);});
  }

  // ---------- views ----------
  function plusBtn(act,bg,sh){return '<div class="tap" data-act="'+act+'" style="width:40px;height:40px;border-radius:50%;background:'+bg+';display:flex;align-items:center;justify-content:center;box-shadow:0 3px 10px '+sh+'"><svg width="20" height="20" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14" stroke="#fff" stroke-width="2.2" stroke-linecap="round"/></svg></div>';}
  function header(title,sub,btn){return '<div style="display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:18px"><div><div class="serif" style="font-size:30px;font-weight:500">'+title+'</div><div style="font-size:13.5px;color:#8A938C;margin-top:2px">'+sub+'</div></div>'+(btn||'')+'</div>';}

  function viewToday(){
    var fq=dayQuote();
    var _td=new Date();var mSch=0,mTk=0;
    state.meds.forEach(function(x){if(medActiveOn(x,_td)){mSch+=x.times.length;mTk+=(x.done||[]).filter(Boolean).length;}});
    var tkey=todayKey();
    var todayExp=state.expenses.filter(function(e){return e.date===tkey;});
    var total=todayExp.reduce(function(a,e){return a+e.amount;},0);
    var habitsDone=state.habits.filter(function(x){return x.done;}).length;
    var now=new Date();
    var greeting=now.getHours()<12?'Good morning':now.getHours()<18?'Good afternoon':'Good evening';
    var dateLabel=now.toLocaleDateString('en-US',{weekday:'long'})+' · '+now.toLocaleDateString('en-US',{month:'long',day:'numeric'});
    function stat(act,dot,label,big,small){return '<div class="tap" data-act="'+act+'" style="background:#F6F6F1;border-radius:20px;padding:18px 16px"><div style="display:flex;align-items:center;gap:8px"><span style="width:9px;height:9px;border-radius:50%;background:'+dot+'"></span><span style="font-size:13px;color:#727B74;font-weight:600">'+label+'</span></div><div class="serif" style="font-size:27px;margin-top:12px">'+big+'</div><div style="font-size:12.5px;color:#9AA39C;margin-top:2px">'+small+'</div></div>';}
    return '<div class="pad">'+
      '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:18px"><div class="serif" style="font-size:21px;font-weight:500;letter-spacing:.5px">Eseté</div>'+
      '<div class="tap" data-act="notif" style="width:40px;height:40px;border-radius:50%;background:#F6F6F1;display:flex;align-items:center;justify-content:center;box-shadow:0 1px 2px rgba(44,58,52,.06)"><svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9" stroke="#727B74" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/><path d="M13.7 21a2 2 0 0 1-3.4 0" stroke="#727B74" stroke-width="1.7" stroke-linecap="round"/></svg></div></div>'+
      '<div class="serif" style="font-size:34px;line-height:1.1;font-weight:500">'+greeting+'</div>'+
      '<div style="font-size:14px;color:#8A938C;margin-top:6px;letter-spacing:.3px">'+dateLabel+'</div>'+
      '<div style="margin-top:24px;background:#2C3A34;border-radius:24px;padding:26px 24px"><div class="serif" style="font-size:12px;letter-spacing:2px;text-transform:uppercase;color:#9DB0A1">Today at '+esc(settings.reminderTime||'9:00')+'</div>'+
      '<div class="serif" style="font-style:italic;font-size:23px;line-height:1.35;color:#F1F2EC;margin-top:14px">'+esc(fq.t)+'</div>'+
      '<div style="margin-top:18px;font-size:13.5px;color:#AEBBB0;font-weight:500">'+esc(fq.a)+' · '+esc(fq.b)+'</div></div>'+
      '<div style="margin-top:14px;display:grid;grid-template-columns:1fr 1fr;gap:12px">'+
      stat('tab:meds','#8193AE','Medications',mTk+' of '+mSch,'taken today')+
      stat('tab:money','#B5896E','Spent',money(total),todayExp.length+(todayExp.length===1?' entry':' entries'))+
      stat('tab:habits','#7E9C82','Habits',habitsDone+' of '+state.habits.length,'completed')+
      stat('tab:reflect','#948AA0','Reflection',state.reflectSaved?'Done':'Open',state.reflectSaved?'reflection saved':'awaiting tonight')+
      '</div>'+
      '<div class="tap" data-act="tab:reflect" style="margin-top:14px;background:#DFE6DF;border-radius:20px;padding:18px 20px;display:flex;align-items:center;justify-content:space-between"><div><div class="serif" style="font-size:18px;color:#34433C">Close your day</div><div style="font-size:13px;color:#6E7A71;margin-top:2px">A few moments of reflection</div></div><svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M9 6l6 6-6 6" stroke="#5C6B61" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>'+
      '</div>';
  }

  function viewMeds(){
    if(!state.medSelDay)state.medSelDay=todayKey();
    if(!state.medWeekStart)state.medWeekStart=fmtKey(mondayOf(new Date()));
    if(!state.medMonthAnchor){var _sd0=keyToDate(state.medSelDay);state.medMonthAnchor=fmtKey(new Date(_sd0.getFullYear(),_sd0.getMonth(),1));}
    var dayLetters=['M','T','W','T','F','S','S'];
    var todayK=todayKey();
    var selKey=state.medSelDay;var selDate=keyToDate(selKey);var selWi=(selDate.getDay()+6)%7;
    var isToday=selKey===todayK;var weekStart=keyToDate(state.medWeekStart);
    var monthView=!!state.medMonthView;
    var labelDate=monthView?keyToDate(state.medMonthAnchor):weekStart;
    var labelTxt=labelDate.toLocaleDateString('en-US',{month:'long',year:'numeric'});
    var navHeader='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:11px;padding:0 2px">'+
      '<div class="tap" data-act="medweek" data-v="-1" style="width:30px;height:30px;border-radius:50%;background:#EAEAE3;display:flex;align-items:center;justify-content:center"><svg width="15" height="15" viewBox="0 0 24 24" fill="none"><path d="M15 6l-6 6 6 6" stroke="#5C6B61" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>'+
      '<div class="tap" data-act="medmonth" style="display:flex;align-items:center;gap:5px"><span style="font-size:14px;font-weight:700;color:#3A463F">'+labelTxt+'</span><svg width="13" height="13" viewBox="0 0 24 24" fill="none" style="transform:rotate('+(monthView?'180':'0')+'deg)"><path d="M6 9l6 6 6-6" stroke="#5C6B61" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>'+

  var _shell=false,_lastTab=null,_lastOverlay=null,_prevSheet=false,_prevNotif=false,_prevInstall=false;
  function buildShell(){
    document.getElementById('app').innerHTML='<div class="col"><div class="scroll" id="scrollEl"></div><div id="tabbarEl"></div><div id="overlayEl"></div></div>';
    _shell=true;_lastTab=null;_lastOverlay=null;
  }
  function render(){
    if(!_shell)buildShell();
    var content=state.tab==='today'?viewToday():state.tab==='meds'?viewMeds():state.tab==='money'?viewMoney():state.tab==='habits'?viewHabits():state.tab==='reflect'?viewReflect():viewSummary();
    var sc=document.getElementById('scrollEl');
    var sameTab=(state.tab===_lastTab);
    var st=sameTab?sc.scrollTop:0;
    sc.innerHTML=content;
    if(sameTab)sc.scrollTop=st;
    if(!sameTab){document.getElementById('tabbarEl').innerHTML=tabBar();_lastTab=state.tab;}
    var ov=sheetView(state.sheet&&!_prevSheet)+notifView(state.notif&&!_prevNotif)+installView(state.showInstall&&!_prevInstall);
    if(ov!==_lastOverlay){document.getElementById('overlayEl').innerHTML=ov;_lastOverlay=ov;}
    _prevSheet=!!state.sheet;_prevNotif=!!state.notif;_prevInstall=!!state.showInstall;
  }

  // ---------- actions ----------
  function openNew(type){state.sheet=type;state.editId=null;
    state.draftM={name:'',dose:'',times:[],weekdays:[1,1,1,1,1,1,1],timeInput:'',duration:'ongoing',start:todayKey(),end:''};state.draftH={name:''};
    state.draftE={amount:'',cat:'Food',label:''};state.draftD={label:'',color:'#7E9C82'};render();}
  function openEdit(type,id){
    if(type==='med'){var m=find(state.meds,id);state.sheet='med';state.editId=id;state.draftM={name:m.name,dose:m.dose,times:(m.times||[]).slice(),weekdays:((m.weekdays&&m.weekdays.length===7)?m.weekdays:[1,1,1,1,1,1,1]).slice(),timeInput:'',duration:m.end?'course':'ongoing',start:m.start||todayKey(),end:m.end||''};}
    if(type==='habit'){var h=find(state.habits,id);state.sheet='habit';state.editId=id;state.draftH={name:h.name};}
    if(type==='expense'){var e=find(state.expenses,id);state.sheet='expense';state.editId=id;state.draftE={amount:String(e.amount),cat:e.cat,label:e.label};}
    if(type==='dim'){var d=find(state.reflectDims,id);state.sheet='dim';state.editId=id;state.draftD={label:d.label,color:d.color};}
    render();}
  function find(arr,id){for(var i=0;i<arr.length;i++)if(arr[i].id===id)return arr[i];return null;}
  function closeSheet(){state.sheet=null;state.editId=null;render();}

  function saveExpense(){
    var amt=parseFloat(state.draftE.amount)||0;if(!amt){closeSheet();return;}
    var label=(state.draftE.label||'').trim()||state.draftE.cat;
    if(state.editId){state.expenses=state.expenses.map(function(e){return e.id===state.editId?Object.assign({},e,{amount:amt,cat:state.draftE.cat,label:label}):e;});}
    else{var now=new Date();state.expenses=[{id:uid(),label:label,amount:amt,cat:state.draftE.cat,time:'now',date:todayKey(),ts:now.getTime()}].concat(state.expenses);}
    closeSheet();save();}
  function saveMed(){
    var d=state.draftM;if(!d.name.trim()){closeSheet();return;}
    var times=(d.times||[]).slice();if(times.length===0)times=['Anytime'];
    var wd=(d.weekdays||[]).slice();if(wd.length!==7||wd.every(function(x){return !x;}))wd=[1,1,1,1,1,1,1];
    var st=null,en=null;if(d.duration==='course'&&d.end){en=d.end;st=d.start||todayKey();}
    var base={name:d.name.trim(),dose:d.dose.trim()||'—',times:times,weekdays:wd,start:st,end:en};
    if(state.editId){state.meds=state.meds.map(function(m){if(m.id!==state.editId)return m;var done=times.map(function(t,i){return (m.done&&m.done[i])||false;});return Object.assign({},m,base,{done:done});});}
    else{state.meds=state.meds.concat([Object.assign({id:uid()},base,{done:times.map(function(){return false;})})]);}
    closeSheet();save();}
  function saveHabit(){var n=state.draftH.name.trim();if(!n){closeSheet();return;}
    if(state.editId)state.habits=state.habits.map(function(h){return h.id===state.editId?Object.assign({},h,{name:n}):h;});
    else state.habits=state.habits.concat([{id:uid(),name:n,streak:0,done:false,days:[0,0,0,0,0,0,0]}]);
    closeSheet();save();}
  function saveDim(){var l=state.draftD.label.trim();if(!l){closeSheet();return;}
    if(state.editId)state.reflectDims=state.reflectDims.map(function(d){return d.id===state.editId?Object.assign({},d,{label:l,color:state.draftD.color}):d;});
    else state.reflectDims=state.reflectDims.concat([{id:uid(),label:l,color:state.draftD.color,value:50}]);
    closeSheet();save();}
  function deleteItem(){var id=state.editId,t=state.sheet;
    if(t==='med')state.meds=state.meds.filter(function(x){return x.id!==id;});
    if(t==='habit')state.habits=state.habits.filter(function(x){return x.id!==id;});
    if(t==='expense')state.expenses=state.expenses.filter(function(x){return x.id!==id;});
    if(t==='dim')state.reflectDims=state.reflectDims.filter(function(x){return x.id!==id;});
    closeSheet();save();}

  function eKey(k){var a=state.draftE.amount;
    if(k==='del')a=a.slice(0,-1);
    else if(k==='000'){if(a&&a!=='0')a=a+'000';}
    else a=(a==='0'||a==='')?k:a+k;
    if(a.length>9)return;state.draftE.amount=a;render();}

  function toggleMedTime(id,ti){state.meds=state.meds.map(function(m){if(m.id!==id)return m;var done=(m.done||m.times.map(function(){return false;})).map(function(v,i){return i===ti?!v:v;});return Object.assign({},m,{done:done});});render();save();}
  function toggleHabit(i){state.habits=state.habits.map(function(h,j){if(j!==i)return h;var done=!h.done;var days=h.days.slice();days[6]=done?1:0;return Object.assign({},h,{done:done,streak:done?h.streak+1:Math.max(0,h.streak-1),days:days});});render();save();}

  // ---------- event wiring ----------
  document.getElementById('app').addEventListener('click',function(e){
    var t=e.target.closest('[data-act]');if(!t)return;
    var act=t.dataset.act;
    if(act.indexOf('tab:')===0){state.tab=act.slice(4);state.notif=false;render();return;}
    if(act.indexOf('new:')===0){openNew(act.slice(4));return;}
    if(act.indexOf('edit:')===0){openEdit(act.slice(5),t.dataset.id);return;}
    switch(act){
      case 'notif':state.notif=true;render();break;
      case 'closeNotif':state.notif=false;render();break;
      case 'close':closeSheet();break;
      case 'medtime':toggleMedTime(t.dataset.id,parseInt(t.dataset.ti,10));break;
      case 'medday':state.medSelDay=t.dataset.id;render();break;
      case 'medweek':{if(state.medMonthView){var ma=keyToDate(state.medMonthAnchor);ma.setMonth(ma.getMonth()+parseInt(t.dataset.v,10));state.medMonthAnchor=fmtKey(new Date(ma.getFullYear(),ma.getMonth(),1));}else{var mws=keyToDate(state.medWeekStart);mws.setDate(mws.getDate()+parseInt(t.dataset.v,10)*7);state.medWeekStart=fmtKey(mws);}render();break;}
      case 'medmonth':{if(state.medMonthView){state.medMonthView=false;state.medWeekStart=fmtKey(mondayOf(keyToDate(state.medSelDay)));}else{state.medMonthView=true;var sdm=keyToDate(state.medSelDay);state.medMonthAnchor=fmtKey(new Date(sdm.getFullYear(),sdm.getMonth(),1));}render();break;}
      case 'medtoday':{var nd=new Date();state.medSelDay=todayKey();state.medWeekStart=fmtKey(mondayOf(nd));state.medMonthAnchor=fmtKey(new Date(nd.getFullYear(),nd.getMonth(),1));render();break;}
      case 'habit':toggleHabit(parseInt(t.dataset.i,10));break;
      case 'period':state.summaryPeriod=t.dataset.v;render();save();break;
      case 'pad':eKey(t.dataset.v);break;
      case 'ecat':state.draftE.cat=t.dataset.v;render();break;
      case 'saveE':saveExpense();break;
      case 'addtime':{var v=(state.draftM.timeInput||'').trim();if(v){state.draftM.times=state.draftM.times.concat([v]);state.draftM.timeInput='';render();}break;}
      case 'rmtime':{var i=parseInt(t.dataset.i,10);state.draftM.times=state.draftM.times.filter(function(_,j){return j!==i;});render();break;}
      case 'wd':{var k=parseInt(t.dataset.i,10);var wd=(state.draftM.weekdays||[1,1,1,1,1,1,1]).slice();wd[k]=wd[k]?0:1;state.draftM.weekdays=wd;render();break;}
      case 'saveM':saveMed();break;
      case 'mdur':state.draftM.duration=t.dataset.v;render();break;
      case 'saveH':saveHabit();break;
      case 'dcolor':state.draftD.color=t.dataset.v;render();break;
      case 'saveD':saveDim();break;
      case 'del':deleteItem();break;
      case 'saveR':state.reflectSaved=true;render();save();break;
      case 'editR':state.reflectSaved=false;render();save();break;
      case 'rword':state.reflectWord=t.dataset.v;state.reflectSaved=false;render();save();break;
      case 'dismissInstall':try{localStorage.setItem('esete-install-dismissed','1');}catch(_){}state.showInstall=false;render();break;
    }
  });

  // input (no re-render to preserve focus/caret)
  document.getElementById('app').addEventListener('input',function(e){
    var t=e.target.closest('[data-in]');if(!t)return;var k=t.dataset.in;var v=t.value;
    if(k==='elabel')state.draftE.label=v;
    else if(k==='mname')state.draftM.name=v;
    else if(k==='mdose')state.draftM.dose=v;
    else if(k==='mtime')state.draftM.timeInput=v;
    else if(k==='mstart')state.draftM.start=isoToKey(v);
    else if(k==='mend')state.draftM.end=v?isoToKey(v):'';
    else if(k==='dlabel')state.draftD.label=v;
    else if(k==='hname')state.draftH.name=v;
    else if(k==='rwordother'){state.reflectWordOther=v;state.reflectSaved=false;}
    else if(k==='note'){state.reflectNote=v;state.reflectSaved=false;}
    else if(k==='dim'){var id=t.dataset.id;state.reflectDims=state.reflectDims.map(function(d){return d.id===id?Object.assign({},d,{value:Number(v)}):d;});state.reflectSaved=false;var ws=document.querySelector('[data-word="'+id+'"]');if(ws)ws.textContent=word(Number(v));}
  });
  // commit slider/note state on release
  document.getElementById('app').addEventListener('change',function(e){
    var t=e.target.closest('[data-in]');if(!t)return;var k=t.dataset.in;
    if(k==='dim'||k==='note'||k==='rwordother'){save();}
  });

  // ---------- install detection ----------
  function detectInstall(){
    try{
      var standalone=window.navigator.standalone||(window.matchMedia&&window.matchMedia('(display-mode: standalone)').matches);
      var isIOS=/iphone|ipad|ipod/i.test(navigator.userAgent||'');
      var dismissed=localStorage.getItem('esete-install-dismissed');
      if(!standalone&&isIOS&&!dismissed)state.showInstall=true;
    }catch(e){}
  }

  // ---------- boot ----------
  load();detectInstall();render();
  // refresh greeting/quote if app left open across midnight
  setInterval(function(){var k=todayKey();if(state.day&&state.day!==k){rollover();save();render();}},60000);
})();
</script>
</body>
</html>
